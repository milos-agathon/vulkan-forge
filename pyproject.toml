[build-system]
requires = ["scikit-build-core", "pybind11"]
build-backend = "scikit_build_core.build"

[project]
name = "vulkan-forge"
version = "2.0.0"
description = "Vulkan-accelerated 3D height field renderer for Python"
readme = "README.md"
authors = [{name = "Your Name", email = "you@example.com"}]
requires-python = ">=3.8"
license = {text = "MIT"}
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: C++",
    "Topic :: Scientific/Engineering :: Visualization",
]
dependencies = [
    "numpy>=1.21",
    "matplotlib>=3.5",
    "pillow>=8.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=6.0",
    "pytest-cov",
    "black",
    "isort",
    "mypy",
]

[project.urls]
Homepage = "https://github.com/yourusername/vulkan-forge"
Documentation = "https://vulkan-forge.readthedocs.io"
Repository = "https://github.com/yourusername/vulkan-forge"
Issues = "https://github.com/yourusername/vulkan-forge/issues"

[tool.scikit-build]
cmake.version = ">=3.24"
cmake.source-dir = "cpp"
ninja.version = ">=1.10"
logging.level = "INFO"
install.strip = false

[tool.scikit-build.cmake.define]
CMAKE_BUILD_TYPE = "Release"
CMAKE_CXX_STANDARD = "17"

[tool.cibuildwheel]
build-requires = ["pybind11", "ninja"]
test-requires = ["pytest", "numpy", "matplotlib"]
test-command = "pytest {project}/tests"

[tool.cibuildwheel.windows]
before-build = "pip install delvewheel"
repair-wheel-command = "delvewheel repair -w {dest_dir} {wheel}"

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --strict-markers"
testpaths = ["tests"]

[tool.black]
line-length = 100
target-version = ['py38', 'py39', 'py310', 'py311']

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.8"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true